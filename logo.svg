<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b04a"/>
      <stop offset="100%" style="stop-color:#c8943e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7d794;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e2b04a;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="sword" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#8a8a8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="245" fill="none" stroke="#e2b04a" stroke-width="2" opacity="0.3"/>

  <!-- Open book -->
  <g transform="translate(256,280)">
    <!-- Left page -->
    <path d="M-10,0 C-10,-20 -120,-100 -140,-110 L-140,30 C-120,20 -10,20 -10,0 Z"
          fill="#f5e6c8" stroke="#c8943e" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M10,0 C10,-20 120,-100 140,-110 L140,30 C120,20 10,20 10,0 Z"
          fill="#f0ddb8" stroke="#c8943e" stroke-width="1.5"/>
    <!-- Book spine -->
    <path d="M-10,0 L0,-8 L10,0 L0,22 Z" fill="url(#book)"/>
    <!-- Page lines left -->
    <line x1="-30" y1="-10" x2="-110" y2="-60" stroke="#c8943e" stroke-width="0.8" opacity="0.4"/>
    <line x1="-28" y1="0" x2="-108" y2="-48" stroke="#c8943e" stroke-width="0.8" opacity="0.4"/>
    <line x1="-26" y1="10" x2="-106" y2="-36" stroke="#c8943e" stroke-width="0.8" opacity="0.4"/>
    <!-- Page lines right -->
    <line x1="30" y1="-10" x2="110" y2="-60" stroke="#c8943e" stroke-width="0.8" opacity="0.4"/>
    <line x1="28" y1="0" x2="108" y2="-48" stroke="#c8943e" stroke-width="0.8" opacity="0.4"/>
    <line x1="26" y1="10" x2="106" y2="-36" stroke="#c8943e" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Magical glow from book -->
  <ellipse cx="256" cy="250" rx="60" ry="80" fill="url(#glow)" opacity="0.15"/>

  <!-- Sword (RPG element) - diagonal across book -->
  <g transform="translate(256,200) rotate(-30)">
    <!-- Blade -->
    <rect x="-4" y="-100" width="8" height="120" rx="2" fill="url(#sword)"/>
    <polygon points="0,-105 -6,-95 6,-95" fill="#d4d4d4"/>
    <!-- Guard -->
    <rect x="-18" y="18" width="36" height="6" rx="3" fill="#e2b04a"/>
    <!-- Grip -->
    <rect x="-5" y="24" width="10" height="30" rx="2" fill="#8B4513"/>
    <!-- Pommel -->
    <circle cx="0" cy="58" r="7" fill="#e2b04a"/>
  </g>

  <!-- Quill pen (literature element) -->
  <g transform="translate(310,180) rotate(25)">
    <!-- Feather -->
    <path d="M0,0 C-15,-40 -5,-80 0,-110 C5,-80 15,-40 0,0 Z"
          fill="#f5f5f5" opacity="0.9"/>
    <path d="M0,0 C-8,-40 -2,-80 0,-110 C2,-80 8,-40 0,0 Z"
          fill="#e8e8e8"/>
    <!-- Shaft -->
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#d4d4d4" stroke-width="1"/>
    <!-- Nib -->
    <path d="M-2,0 L0,15 L2,0 Z" fill="#2a2a2a"/>
  </g>

  <!-- D20 dice (RPG element) - small, top left area -->
  <g transform="translate(170,155) scale(0.7)">
    <polygon points="0,-35 30,15 -30,15" fill="none" stroke="#e2b04a" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#e2b04a" font-family="Georgia,serif" font-size="18" font-weight="bold">20</text>
  </g>

  <!-- Stars / sparkles -->
  <g fill="#f7d794" opacity="0.7">
    <circle cx="150" cy="120" r="2"/>
    <circle cx="360" cy="110" r="2.5"/>
    <circle cx="130" cy="200" r="1.5"/>
    <circle cx="380" cy="190" r="2"/>
    <circle cx="200" cy="100" r="1.8"/>
    <circle cx="320" cy="130" r="1.5"/>
  </g>

  <!-- Title text -->
  <text x="256" y="395" text-anchor="middle" fill="#e2b04a" font-family="Georgia,serif" font-size="42" font-weight="bold" letter-spacing="3">NOVEL RPG</text>
  <text x="256" y="425" text-anchor="middle" fill="#f7d794" font-family="Georgia,serif" font-size="16" letter-spacing="5" opacity="0.7">CHOOSE YOUR STORY</text>
</svg>
