<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7d794"/>
      <stop offset="100%" style="stop-color:#e2b04a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7d794;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e2b04a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="sword" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#9a9a9a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#f7d794">
    <line x1="0" y1="0" x2="1280" y2="640"/>
    <line x1="0" y1="640" x2="1280" y2="0"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
  </g>

  <!-- Stars -->
  <g fill="#f7d794" opacity="0.4">
    <circle cx="100" cy="80" r="1.5"/>
    <circle cx="250" cy="150" r="1"/>
    <circle cx="400" cy="60" r="1.8"/>
    <circle cx="550" cy="120" r="1.2"/>
    <circle cx="750" cy="70" r="1.5"/>
    <circle cx="900" cy="130" r="1"/>
    <circle cx="1050" cy="50" r="1.8"/>
    <circle cx="1180" cy="100" r="1.3"/>
    <circle cx="150" cy="550" r="1"/>
    <circle cx="1100" cy="560" r="1.2"/>
  </g>

  <!-- Left section: Logo icon -->
  <g transform="translate(300,300)">
    <!-- Glow -->
    <ellipse cx="0" cy="-20" rx="80" ry="100" fill="url(#glow)" opacity="0.1"/>

    <!-- Open book -->
    <g transform="translate(0,40)">
      <path d="M-8,0 C-8,-15 -100,-80 -115,-88 L-115,25 C-100,18 -8,15 -8,0 Z"
            fill="#f5e6c8" stroke="#c8943e" stroke-width="1.2"/>
      <path d="M8,0 C8,-15 100,-80 115,-88 L115,25 C100,18 8,15 8,0 Z"
            fill="#f0ddb8" stroke="#c8943e" stroke-width="1.2"/>
      <path d="M-8,0 L0,-6 L8,0 L0,18 Z" fill="url(#gold)"/>
      <!-- Lines -->
      <line x1="-25" y1="-8" x2="-90" y2="-50" stroke="#c8943e" stroke-width="0.6" opacity="0.3"/>
      <line x1="-23" y1="2" x2="-88" y2="-38" stroke="#c8943e" stroke-width="0.6" opacity="0.3"/>
      <line x1="25" y1="-8" x2="90" y2="-50" stroke="#c8943e" stroke-width="0.6" opacity="0.3"/>
      <line x1="23" y1="2" x2="88" y2="-38" stroke="#c8943e" stroke-width="0.6" opacity="0.3"/>
    </g>

    <!-- Sword -->
    <g transform="translate(0,-30) rotate(-30)">
      <rect x="-3.5" y="-85" width="7" height="100" rx="2" fill="url(#sword)"/>
      <polygon points="0,-90 -5,-80 5,-80" fill="#d4d4d4"/>
      <rect x="-15" y="13" width="30" height="5" rx="2.5" fill="#e2b04a"/>
      <rect x="-4" y="18" width="8" height="25" rx="2" fill="#8B4513"/>
      <circle cx="0" cy="47" r="6" fill="#e2b04a"/>
    </g>

    <!-- Quill -->
    <g transform="translate(50,-50) rotate(25)">
      <path d="M0,0 C-12,-35 -4,-65 0,-90 C4,-65 12,-35 0,0 Z" fill="#f5f5f5" opacity="0.85"/>
      <line x1="0" y1="0" x2="0" y2="-90" stroke="#d4d4d4" stroke-width="0.8"/>
      <path d="M-1.5,0 L0,12 L1.5,0 Z" fill="#2a2a2a"/>
    </g>

    <!-- D20 -->
    <g transform="translate(-70,-75) scale(0.55)">
      <polygon points="0,-35 30,15 -30,15" fill="none" stroke="#e2b04a" stroke-width="2.5"/>
      <text x="0" y="5" text-anchor="middle" fill="#e2b04a" font-family="Georgia,serif" font-size="18" font-weight="bold">20</text>
    </g>
  </g>

  <!-- Right section: Text -->
  <g transform="translate(640,0)">
    <!-- Title -->
    <text x="120" y="230" fill="url(#gold)" font-family="Georgia,serif" font-size="72" font-weight="bold" letter-spacing="4">NOVEL RPG</text>

    <!-- Divider -->
    <line x1="120" y1="255" x2="520" y2="255" stroke="#e2b04a" stroke-width="1" opacity="0.4"/>

    <!-- Subtitle -->
    <text x="120" y="295" fill="#f7d794" font-family="Georgia,serif" font-size="20" letter-spacing="2" opacity="0.8">CHOOSE YOUR CHARACTER. RESHAPE THE STORY.</text>

    <!-- Features -->
    <g fill="#a0a0b8" font-family="system-ui,sans-serif" font-size="16">
      <text x="120" y="355">Wuthering Heights  |  Journey to the West  |  PDF Import</text>
      <text x="120" y="385">Multi-perspective  |  Stats &amp; Choices  |  Save System</text>
    </g>

    <!-- Install command -->
    <g transform="translate(120,420)">
      <rect x="0" y="0" width="380" height="44" rx="8" fill="#0d1117" stroke="#e2b04a" stroke-width="1" opacity="0.8"/>
      <text x="15" y="28" fill="#7ee787" font-family="monospace" font-size="16">$ npx novel-rpg-skill</text>
    </g>

    <!-- Platforms -->
    <text x="120" y="510" fill="#6a6a8a" font-family="system-ui,sans-serif" font-size="14">Works with OpenClaw  ·  Claude Code  ·  Any LLM</text>
  </g>

  <!-- Border -->
  <rect x="2" y="2" width="1276" height="636" rx="4" fill="none" stroke="#e2b04a" stroke-width="1" opacity="0.1"/>
</svg>
